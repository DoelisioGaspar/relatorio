<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório do Publicador</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-chart-bar"></i>
            <span>Relatório de Serviço</span>
        </div>
        <div class="nav-info">
            <span id="pubInfo"></span>
            <button class="btn btn-sm btn-danger" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </nav>

    <div class="pub-container">
        <div class="card card-wide">
            <div class="form-header">
                <i class="fas fa-file-alt icon-large"></i>
                <h2>Enviar Relatório de Serviço</h2>
            </div>

            <form id="formRelatorio">
                <!-- Mês e Ano -->
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Mês</label>
                        <select id="relMes" required>
                            <option value="1">Janeiro</option>
                            <option value="2">Fevereiro</option>
                            <option value="3">Março</option>
                            <option value="4">Abril</option>
                            <option value="5">Maio</option>
                            <option value="6">Junho</option>
                            <option value="7">Julho</option>
                            <option value="8">Agosto</option>
                            <option value="9">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar-alt"></i> Ano</label>
                        <select id="relAno"></select>
                    </div>
                </div>

                <!-- Participação -->
                <div class="form-group">
                    <label><i class="fas fa-bullhorn"></i> Participei em alguma modalidade de pregação</label>
                    <div class="toggle-group">
                        <label class="toggle-option">
                            <input type="radio" name="participou" value="Sim" id="participouSim"> 
                            <span class="toggle-label yes">Sim</span>
                        </label>
                        <label class="toggle-option">
                            <input type="radio" name="participou" value="Nao" id="participouNao" checked>
                            <span class="toggle-label no">Não</span>
                        </label>
                    </div>
                </div>

                <!-- Campos condicionais -->
                <div id="camposAtivos" class="campos-condicionais disabled">
                    <!-- Designação -->
                    <div class="form-group">
                        <label><i class="fas fa-id-badge"></i> Designação</label>
                        <select id="designacao">
                            <option value="Publicador">Publicador (sem designação de pioneiro)</option>
                            <option value="Pioneiro Auxiliar">Pioneiro Auxiliar</option>
                            <option value="Pioneiro Regular">Pioneiro Regular</option>
                        </select>
                    </div>

                    <!-- Horas -->
                    <div class="form-group" id="grupoHoras" style="display:none;">
                        <label><i class="fas fa-clock"></i> Horas</label>
                        <input type="number" id="horas" min="0" max="999" value="0" placeholder="Número de horas">
                    </div>

                    <!-- Estudos -->
                    <div class="form-group">
                        <label><i class="fas fa-book-open"></i> Estudos Bíblicos Dirigidos</label>
                        <input type="number" id="estudos" min="0" max="99" value="0" placeholder="Número de estudos">
                    </div>
                </div>

                <div id="lockNotice" class="notice-lock hidden">
                    <i class="fas fa-lock"></i> Este mês está trancado. Não é possível enviar ou editar relatórios.
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="btnEnviar">
                    <i class="fas fa-paper-plane"></i> Enviar Relatório
                </button>
            </form>

            <div id="relMsg" class="message hidden"></div>
        </div>

        <!-- Histórico -->
        <div class="card card-wide">
            <h3><i class="fas fa-history"></i> Meus Relatórios Enviados</h3>
            <div class="table-responsive">
                <table class="table" id="tabelaHistorico">
                    <thead>
                        <tr>
                            <th>Mês/Ano</th>
                            <th>Participou</th>
                            <th>Designação</th>
                            <th>Horas</th>
                            <th>Estudos</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <p id="noHistorico" class="empty-msg hidden">
                <i class="fas fa-info-circle"></i> Nenhum relatório enviado ainda.
            </p>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/publicador.js"></script>
</body>
</html>
